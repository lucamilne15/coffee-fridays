<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friday Coffee Club ☕</title>
  <style>
    :root {
      --brown-dark: #3E2012;
      --brown:      #6F4E37;
      --brown-mid:  #9C6B41;
      --caramel:    #C68642;
      --cream:      #F5F0E8;
      --cream-dark: #EDE4D3;
      --white:      #FFFDF9;
      --text:       #2C1810;
      --text-mid:   #6B4226;
      --shadow:     rgba(62,32,18,0.12);
      --gold:       #F0B429;
      --silver:     #B0BEC5;
      --bronze:     #CD7F32;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    /* Header */
    header { background: var(--brown-dark); color: var(--cream); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 64px; box-shadow: 0 2px 12px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    nav { display: flex; gap: 2px; }
    nav button { background: none; border: none; color: var(--cream); opacity: 0.65; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
    nav button:hover { opacity: 1; background: rgba(255,255,255,0.1); }
    nav button.active { opacity: 1; background: rgba(255,255,255,0.15); }

    /* Pages */
    .page { display: none; max-width: 760px; margin: 0 auto; padding: 28px 16px 64px; }
    .page.active { display: block; }

    /* Cards */
    .card { background: var(--white); border-radius: 16px; padding: 22px; box-shadow: 0 2px 16px var(--shadow); margin-bottom: 16px; }

    h2 { font-size: 1.4rem; font-weight: 700; color: var(--brown-dark); margin-bottom: 20px; }
    h3 { font-size: 1rem; font-weight: 600; color: var(--brown-dark); margin-bottom: 14px; }
    .section-label { font-size: 0.75rem; font-weight: 700; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; }

    /* Form */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.78rem; font-weight: 600; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.5px; }
    input, textarea, select { padding: 10px 14px; border: 1.5px solid var(--cream-dark); border-radius: 10px; font-size: 0.95rem; background: var(--cream); color: var(--text); outline: none; transition: border-color 0.15s; font-family: inherit; }
    input:focus, textarea:focus, select:focus { border-color: var(--caramel); background: var(--white); }
    textarea { resize: vertical; min-height: 80px; }

    /* New person inline input */
    #new-person-row { display: none; flex-direction: column; gap: 6px; margin-top: 8px; }
    #new-person-row.visible { display: flex; }
    .new-person-controls { display: flex; gap: 8px; }
    .new-person-controls input { flex: 1; }
    .btn-sm { background: var(--brown); color: var(--cream); border: none; padding: 10px 16px; border-radius: 10px; font-size: 0.88rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-sm:hover { background: var(--brown-dark); }
    .btn-sm-ghost { background: none; border: 1.5px solid var(--cream-dark); color: var(--text-mid); padding: 10px 14px; border-radius: 10px; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
    .btn-sm-ghost:hover { border-color: var(--caramel); }

    /* Rating sliders */
    .ratings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .rating-item { display: flex; flex-direction: column; gap: 8px; }
    .rating-label-row { display: flex; justify-content: space-between; align-items: center; }
    .rating-name { font-size: 0.8rem; font-weight: 600; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.5px; }
    .rating-value { font-size: 1rem; font-weight: 700; color: var(--caramel); background: var(--cream); border-radius: 6px; padding: 2px 8px; min-width: 36px; text-align: center; }
    input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 3px; background: var(--cream-dark); border: none; padding: 0; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--caramel); box-shadow: 0 1px 4px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.1s; }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }

    /* Buttons */
    .btn-primary { background: var(--brown); color: var(--cream); border: none; padding: 12px 28px; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .btn-primary:hover { background: var(--brown-dark); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { background: none; border: 1.5px solid #e57373; color: #c62828; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-danger:hover { background: #ffebee; }

    /* Toast */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--brown-dark); color: var(--cream); padding: 12px 24px; border-radius: 12px; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; pointer-events: none; }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* This Week's Pick */
    .pick-card { background: linear-gradient(135deg, var(--brown-dark), var(--brown)); color: var(--cream); border-radius: 16px; padding: 22px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(62,32,18,0.25); }
    .pick-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.75; margin-bottom: 6px; }
    .pick-name { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
    .pick-sub { font-size: 0.85rem; opacity: 0.8; }
    .pick-empty { font-size: 0.95rem; opacity: 0.8; }
    .pick-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; background: rgba(255,255,255,0.15); border-radius: 8px; padding: 7px 14px; font-size: 0.85rem; font-weight: 600; color: var(--cream); text-decoration: none; transition: background 0.15s; }
    .pick-link:hover { background: rgba(255,255,255,0.25); }

    /* Recommend a place */
    .recommend-card { border: 2px dashed var(--cream-dark); border-radius: 16px; padding: 20px; margin-bottom: 24px; background: var(--white); }
    .recommend-card h3 { margin-bottom: 14px; }
    .recommend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: end; }

    /* Leaderboard */
    .leaderboard-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--white); border-radius: 14px; box-shadow: 0 2px 12px var(--shadow); margin-bottom: 10px; transition: transform 0.15s; }
    .leaderboard-item:hover { transform: translateY(-1px); }
    .rank { font-size: 1.4rem; font-weight: 800; min-width: 40px; text-align: center; color: var(--brown-mid); }
    .rank.r1 { color: var(--gold); }
    .rank.r2 { color: var(--silver); }
    .rank.r3 { color: var(--bronze); }
    .shop-info { flex: 1; min-width: 0; }
    .shop-name { font-size: 1.05rem; font-weight: 700; color: var(--brown-dark); }
    .shop-meta { font-size: 0.8rem; color: var(--text-mid); margin-top: 2px; }
    .score-badge { text-align: center; background: var(--cream); border-radius: 12px; padding: 8px 14px; flex-shrink: 0; }
    .score-big { font-size: 1.4rem; font-weight: 800; color: var(--brown); line-height: 1; }
    .score-label { font-size: 0.68rem; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .mini-bars { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .mini-bar-group { display: flex; align-items: center; gap: 4px; background: var(--cream); border-radius: 6px; padding: 3px 8px; }
    .mini-bar-label { font-size: 0.7rem; color: var(--text-mid); font-weight: 600; }
    .mini-bar-val { font-size: 0.75rem; font-weight: 700; color: var(--caramel); }
    .score-bar-container { margin-top: 5px; }
    .score-bar { height: 4px; border-radius: 2px; background: var(--cream-dark); overflow: hidden; }
    .score-bar-fill { height: 100%; background: linear-gradient(90deg, var(--caramel), var(--brown-mid)); border-radius: 2px; transition: width 0.5s ease; }

    /* Members */
    .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .member-card { background: var(--white); border-radius: 14px; padding: 16px; box-shadow: 0 2px 12px var(--shadow); }
    .member-name { font-size: 1rem; font-weight: 700; color: var(--brown-dark); margin-bottom: 4px; }
    .member-visits { font-size: 0.8rem; color: var(--text-mid); margin-bottom: 4px; }
    .member-fave { font-size: 0.8rem; color: var(--brown); font-weight: 600; margin-bottom: 6px; }
    .member-stats { display: flex; flex-direction: column; gap: 4px; }
    .member-stat { display: flex; justify-content: space-between; font-size: 0.8rem; }
    .member-stat-label { color: var(--text-mid); }
    .member-stat-val { font-weight: 700; color: var(--caramel); }

    /* History */
    .visit-card { background: var(--white); border-radius: 14px; padding: 16px 18px; box-shadow: 0 2px 12px var(--shadow); margin-bottom: 10px; }
    .visit-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .visit-shop { font-size: 1rem; font-weight: 700; color: var(--brown-dark); }
    .visit-date { font-size: 0.78rem; color: var(--text-mid); margin-top: 2px; }
    .visit-ordered { font-size: 0.88rem; color: var(--text-mid); margin-bottom: 8px; }
    .visit-ordered strong { color: var(--text); }
    .visit-notes { font-size: 0.85rem; color: var(--text-mid); font-style: italic; margin-top: 8px; border-top: 1px solid var(--cream-dark); padding-top: 8px; }
    .visit-scores { display: flex; gap: 5px; flex-wrap: wrap; }
    .score-chip { background: var(--cream); border-radius: 6px; padding: 3px 9px; font-size: 0.76rem; font-weight: 600; color: var(--text-mid); }
    .score-chip span { color: var(--caramel); font-weight: 700; }
    .total-chip { background: var(--brown); color: var(--cream); border-radius: 6px; padding: 3px 9px; font-size: 0.76rem; font-weight: 700; }

    /* Picks page */
    .pick-pool-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--white); border-radius: 12px; box-shadow: 0 2px 10px var(--shadow); margin-bottom: 8px; }
    .pick-pool-name { flex: 1; font-weight: 600; color: var(--brown-dark); }
    .pick-pool-meta { font-size: 0.78rem; color: var(--text-mid); }
    .pick-pool-link { font-size: 0.8rem; color: var(--caramel); font-weight: 600; text-decoration: none; }
    .pick-pool-link:hover { text-decoration: underline; }
    .badge-thisweek { background: var(--gold); color: var(--brown-dark); font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }

    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 40px 24px; color: var(--text-mid); }
    .empty-state .emoji { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-state p { font-size: 0.95rem; }

    @media (max-width: 560px) {
      .form-grid { grid-template-columns: 1fr; }
      .ratings-grid { grid-template-columns: 1fr; }
      .recommend-grid { grid-template-columns: 1fr; }
      nav button { padding: 8px 8px; font-size: 0.8rem; }
      .logo { font-size: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">☕ Friday Coffee Club</div>
  <nav>
    <button onclick="showPage('leaderboard')" id="nav-leaderboard" class="active">Home</button>
    <button onclick="showPage('add')" id="nav-add">Add Visit</button>
    <button onclick="showPage('history')" id="nav-history">History</button>
    <button onclick="showPage('picks')" id="nav-picks">Picks</button>
  </nav>
</header>

<!-- LEADERBOARD / HOME -->
<div class="page active" id="page-leaderboard">

  <!-- This Week's Pick -->
  <div id="weekly-pick-card"></div>

  <!-- Recommend a Place -->
  <div class="recommend-card">
    <h3>📍 Recommend a Place</h3>
    <div class="recommend-grid">
      <div class="form-group">
        <label>Coffee Shop Name</label>
        <input type="text" id="rec-name" placeholder="e.g. Monmouth Coffee" />
      </div>
      <div class="form-group">
        <label>Google Maps Link <span style="font-weight:400;color:#c62828;font-size:0.75rem;text-transform:none;letter-spacing:0;">— no Apple Maps</span></label>
        <input type="url" id="rec-url" placeholder="https://www.google.com/maps/..." />
      </div>
    </div>
    <div style="margin-top:12px;display:flex;align-items:center;gap:12px;">
      <button class="btn-sm" onclick="submitRecommendation()">Add to Pool</button>
      <span id="rec-error" style="font-size:0.82rem;color:#c62828;"></span>
    </div>
  </div>

  <!-- Leaderboard -->
  <div class="section-label">Leaderboard</div>
  <div id="leaderboard-list">
    <div class="empty-state"><div class="spinner" style="border-color:var(--cream-dark);border-top-color:var(--caramel);width:32px;height:32px;border-width:3px;display:inline-block;"></div></div>
  </div>

  <!-- Members -->
  <div class="section-label" style="margin-top:28px;">Members</div>
  <div class="members-grid" id="members-grid"></div>
</div>

<!-- ADD VISIT -->
<div class="page" id="page-add">
  <h2>Log a Coffee Visit</h2>
  <div class="card">
    <div class="form-grid">
      <div class="form-group">
        <label>Coffee Shop</label>
        <select id="f-shop">
          <option value="">— Select —</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="f-date" />
      </div>
      <div class="form-group">
        <label>Your Name</label>
        <select id="f-name">
          <option value="">— Select —</option>
          <option value="__new__">＋ Add new person...</option>
        </select>
        <div id="new-person-row">
          <div class="new-person-controls">
            <input type="text" id="new-person-input" placeholder="Enter your name" />
            <button class="btn-sm" onclick="saveNewPerson()">Save</button>
            <button class="btn-sm-ghost" onclick="cancelNewPerson()">✕</button>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>What You Ordered</label>
        <input type="text" id="f-ordered" placeholder="e.g. Flat white, croissant" />
      </div>
    </div>
  </div>

  <div class="card">
    <h3>Ratings <small style="font-weight:400;color:var(--text-mid);font-size:0.85rem;">(each out of 10)</small></h3>
    <div class="ratings-grid" id="ratings-container"></div>
  </div>

  <div class="card">
    <div class="form-group">
      <label>Notes / Comments (optional)</label>
      <textarea id="f-notes" placeholder="Anything else worth mentioning..."></textarea>
    </div>
  </div>

  <button class="btn-primary" onclick="submitVisit()" id="submit-btn">Save Visit</button>
</div>

<!-- HISTORY -->
<div class="page" id="page-history">
  <h2>Visit History</h2>
  <div id="history-list"></div>
</div>

<!-- PICKS -->
<div class="page" id="page-picks">
  <h2>Recommendation Pool</h2>
  <div id="picks-list"></div>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCJHPcyos1kuRykDWN3r-1pCFTHgMmmbJU",
    authDomain: "coffee-fridays.firebaseapp.com",
    projectId: "coffee-fridays",
    storageBucket: "coffee-fridays.firebasestorage.app",
    messagingSenderId: "668862906412",
    appId: "1:668862906412:web:3b046bc5f944eeaca21189",
    measurementId: "G-TQ6JXGN400"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const CRITERIA = [
    { key: 'coffee',  label: 'Coffee Quality', emoji: '☕' },
    { key: 'vibes',   label: 'Vibes',           emoji: '✨' },
    { key: 'service', label: 'Service',          emoji: '😊' },
    { key: 'price',   label: 'Price',            emoji: '💰' },
  ];

  let allVisits        = [];
  let allProfiles      = [];
  let allRecommendations = [];

  /* ---- ISO week seed (same pick for everyone in the same week) ---- */
  function getWeekSeed() {
    const d = new Date();
    const jan4 = new Date(d.getFullYear(), 0, 4);
    const startW1 = new Date(jan4);
    startW1.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
    const weekNum = Math.floor((d - startW1) / (7 * 86400000)) + 1;
    return d.getFullYear() * 100 + weekNum;
  }

  /* ---- Firestore listeners ---- */
  onSnapshot(query(collection(db, 'visits'), orderBy('timestamp', 'desc')), snap => {
    allVisits = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const active = document.querySelector('.page.active').id;
    if (active === 'page-leaderboard') renderLeaderboard();
    if (active === 'page-history') renderHistory();
  });

  onSnapshot(query(collection(db, 'profiles'), orderBy('createdAt', 'asc')), snap => {
    allProfiles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    refreshProfileDropdown();
    renderMembers();
  });

  onSnapshot(query(collection(db, 'recommendations'), orderBy('addedAt', 'asc')), snap => {
    allRecommendations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderWeeklyPick();
    refreshShopDropdown();
    const active = document.querySelector('.page.active').id;
    if (active === 'page-picks') renderPicksPool();
  });

  /* ---- Shop dropdown (from recommendations) ---- */
  function refreshShopDropdown() {
    const sel = document.getElementById('f-shop');
    const current = sel.value;
    sel.innerHTML = '<option value="">— Select —</option>';
    allRecommendations.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r.name;
      opt.textContent = r.name;
      if (r.name === current) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  /* ---- Profile dropdown ---- */
  function refreshProfileDropdown() {
    const sel = document.getElementById('f-name');
    const saved = localStorage.getItem('last_name') || '';
    sel.innerHTML = '<option value="">— Select —</option>';
    allProfiles.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.textContent = p.name;
      if (p.name === saved) opt.selected = true;
      sel.appendChild(opt);
    });
    const newOpt = document.createElement('option');
    newOpt.value = '__new__';
    newOpt.textContent = '＋ Add new person...';
    sel.appendChild(newOpt);
  }

  document.getElementById('f-name').addEventListener('change', function() {
    const row = document.getElementById('new-person-row');
    if (this.value === '__new__') {
      row.classList.add('visible');
      document.getElementById('new-person-input').focus();
    } else {
      row.classList.remove('visible');
    }
  });

  window.saveNewPerson = async function() {
    const name = document.getElementById('new-person-input').value.trim();
    if (!name) return;
    if (allProfiles.some(p => p.name.toLowerCase() === name.toLowerCase())) {
      showToast('Name already exists');
      return;
    }
    await addDoc(collection(db, 'profiles'), { name, createdAt: serverTimestamp() });
    localStorage.setItem('last_name', name);
    document.getElementById('new-person-input').value = '';
    document.getElementById('new-person-row').classList.remove('visible');
    // Listener will refresh dropdown; manually select the new name after next render
    setTimeout(() => {
      const sel = document.getElementById('f-name');
      for (const opt of sel.options) { if (opt.value === name) { opt.selected = true; break; } }
    }, 500);
    showToast('Profile created!');
  };

  window.cancelNewPerson = function() {
    document.getElementById('new-person-row').classList.remove('visible');
    document.getElementById('new-person-input').value = '';
    document.getElementById('f-name').value = '';
  };

  /* ---- Navigation ---- */
  window.showPage = function(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');
    if (name === 'leaderboard') { renderLeaderboard(); renderMembers(); }
    if (name === 'history') renderHistory();
    if (name === 'picks') renderPicksPool();
  };

  /* ---- Rating sliders ---- */
  function buildRatings() {
    const container = document.getElementById('ratings-container');
    container.innerHTML = '';
    CRITERIA.forEach(c => {
      container.innerHTML += `
        <div class="rating-item">
          <div class="rating-label-row">
            <span class="rating-name">${c.emoji} ${c.label}</span>
            <span class="rating-value" id="val-${c.key}">5</span>
          </div>
          <input type="range" min="1" max="10" value="5" id="slider-${c.key}"
            oninput="document.getElementById('val-${c.key}').textContent = this.value" />
        </div>`;
    });
  }

  function setDefaults() {
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  }

  /* ---- Submit visit ---- */
  window.submitVisit = async function() {
    const shop    = document.getElementById('f-shop').value;
    const date    = document.getElementById('f-date').value;
    const sel     = document.getElementById('f-name');
    const name    = sel.value === '__new__' ? '' : sel.value;
    const ordered = document.getElementById('f-ordered').value.trim();

    if (!shop || !date || !name || !ordered) {
      alert('Please fill in all fields (and select your name from the dropdown).');
      return;
    }

    const ratings = {};
    CRITERIA.forEach(c => { ratings[c.key] = parseInt(document.getElementById('slider-' + c.key).value); });
    const avg = +(Object.values(ratings).reduce((a, b) => a + b, 0) / CRITERIA.length).toFixed(1);

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Saving...';

    try {
      await addDoc(collection(db, 'visits'), {
        shop, date, name, ordered, ratings, avg,
        notes: document.getElementById('f-notes').value.trim(),
        timestamp: serverTimestamp(),
      });
      localStorage.setItem('last_name', name);
      document.getElementById('f-shop').value = '';
      document.getElementById('f-ordered').value = '';

      document.getElementById('f-notes').value = '';
      buildRatings();
      showToast('Visit saved! ☕');
      setTimeout(() => window.showPage('leaderboard'), 800);
    } catch (e) {
      alert('Failed to save: ' + e.message);
    }
    btn.disabled = false;
    btn.innerHTML = 'Save Visit';
  };

  /* ---- Submit recommendation ---- */
  window.submitRecommendation = async function() {
    const name = document.getElementById('rec-name').value.trim();
    const url  = document.getElementById('rec-url').value.trim();
    const err  = document.getElementById('rec-error');
    err.textContent = '';
    if (!name) { err.textContent = 'Enter a shop name.'; return; }
    if (url && !url.startsWith('https://www.google.com/maps')) { err.textContent = 'Only Google Maps links allowed (https://www.google.com/maps/...).'; return; }

    try {
      await addDoc(collection(db, 'recommendations'), {
        name, mapsUrl: url,
        addedAt: serverTimestamp(),
      });
      document.getElementById('rec-name').value = '';
      document.getElementById('rec-url').value = '';
      showToast('Added to the pool!');
    } catch (e) {
      err.textContent = 'Failed: ' + e.message;
    }
  };

  /* ---- Weekly pick ---- */
  function renderWeeklyPick() {
    const card = document.getElementById('weekly-pick-card');
    if (!allRecommendations.length) {
      card.innerHTML = `<div class="pick-card"><div class="pick-label">☕ This Week's Pick</div><div class="pick-empty">No recommendations yet — add one below!</div></div>`;
      return;
    }
    const seed = getWeekSeed();
    const pick = allRecommendations[seed % allRecommendations.length];
    card.innerHTML = `
      <div class="pick-card">
        <div class="pick-label">☕ This Week's Pick</div>
        <div class="pick-name">${esc(pick.name)}</div>
        ${pick.mapsUrl
          ? `<a href="${esc(pick.mapsUrl)}" target="_blank" rel="noopener" class="pick-link">📍 Open in Google Maps</a>`
          : `<div class="pick-sub" style="margin-top:8px;">No map link added</div>`
        }
      </div>`;
  }

  /* ---- Leaderboard ---- */
  function renderLeaderboard() {
    const container = document.getElementById('leaderboard-list');
    renderWeeklyPick();
    if (!allVisits.length) {
      container.innerHTML = `<div class="empty-state"><div class="emoji">☕</div><p>No visits yet — log your first one!</p></div>`;
      return;
    }
    const shops = {};
    allVisits.forEach(v => {
      const key = v.shop.toLowerCase().trim();
      if (!shops[key]) shops[key] = { name: v.shop, visits: [] };
      shops[key].visits.push(v);
    });
    const ranked = Object.values(shops).map(s => {
      const n = s.visits.length;
      const avgScore = +(s.visits.reduce((a, v) => a + v.avg, 0) / n).toFixed(1);
      const avgByKey = {};
      CRITERIA.forEach(c => { avgByKey[c.key] = +(s.visits.reduce((a, v) => a + (v.ratings[c.key] || 0), 0) / n).toFixed(1); });
      return { name: s.name, count: n, avgScore, avgByKey };
    }).sort((a, b) => b.avgScore - a.avgScore);

    const medals = ['🥇', '🥈', '🥉'];
    container.innerHTML = ranked.map((s, i) => {
      const pct = (s.avgScore / 10 * 100).toFixed(0);
      const miniBars = CRITERIA.map(c =>
        `<div class="mini-bar-group"><span class="mini-bar-label">${c.emoji}</span><span class="mini-bar-val">${s.avgByKey[c.key]}</span></div>`
      ).join('');
      return `
        <div class="leaderboard-item">
          <div class="rank ${i < 3 ? 'r'+(i+1) : ''}">${medals[i] || '#'+(i+1)}</div>
          <div class="shop-info">
            <div class="shop-name">${esc(s.name)}</div>
            <div class="shop-meta">${s.count} visit${s.count !== 1 ? 's' : ''}</div>
            <div class="score-bar-container"><div class="score-bar"><div class="score-bar-fill" style="width:${pct}%"></div></div></div>
            <div class="mini-bars">${miniBars}</div>
          </div>
          <div class="score-badge"><div class="score-big">${s.avgScore}</div><div class="score-label">/ 10</div></div>
        </div>`;
    }).join('');
  }

  /* ---- Members ---- */
  function renderMembers() {
    const grid = document.getElementById('members-grid');
    if (!allProfiles.length) { grid.innerHTML = ''; return; }
    grid.innerHTML = allProfiles.map(p => {
      const pVisits = allVisits.filter(v => v.name === p.name);
      const n = pVisits.length;
      const avgOverall = n ? +(pVisits.reduce((a, v) => a + v.avg, 0) / n).toFixed(1) : '—';

      // Favourite place: shop they rated highest on average
      let fave = '—';
      if (n) {
        const shopTotals = {};
        pVisits.forEach(v => {
          const key = v.shop.toLowerCase().trim();
          if (!shopTotals[key]) shopTotals[key] = { name: v.shop, sum: 0, count: 0 };
          shopTotals[key].sum += v.avg;
          shopTotals[key].count++;
        });
        const best = Object.values(shopTotals).sort((a, b) => (b.sum / b.count) - (a.sum / a.count))[0];
        fave = best.name;
      }

      const criteriaRows = CRITERIA.map(c => {
        const avg = n ? +(pVisits.reduce((a, v) => a + (v.ratings[c.key] || 0), 0) / n).toFixed(1) : '—';
        return `<div class="member-stat"><span class="member-stat-label">${c.emoji} ${c.label}</span><span class="member-stat-val">${avg}</span></div>`;
      }).join('');

      return `
        <div class="member-card">
          <div class="member-name">${esc(p.name)}</div>
          <div class="member-visits">☕ ${n} coffee${n !== 1 ? 's' : ''} attended · avg ${avgOverall}/10</div>
          ${n ? `<div class="member-fave">❤️ ${esc(fave)}</div>` : ''}
          <div class="member-stats" style="margin-top:10px;">${criteriaRows}</div>
        </div>`;
    }).join('');
  }

  /* ---- History ---- */
  function renderHistory() {
    const container = document.getElementById('history-list');
    if (!allVisits.length) {
      container.innerHTML = `<div class="empty-state"><div class="emoji">📋</div><p>No visits yet!</p></div>`;
      return;
    }
    container.innerHTML = allVisits.map(v => {
      const chips = CRITERIA.map(c => {
        const val = v.ratings ? (v.ratings[c.key] ?? '—') : '—';
        return `<div class="score-chip">${c.emoji} <span>${val}</span></div>`;
      }).join('');
      const dateStr = v.date ? new Date(v.date + 'T12:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' }) : '';
      return `
        <div class="visit-card">
          <div class="visit-header">
            <div><div class="visit-shop">${esc(v.shop)}</div><div class="visit-date">${dateStr} · ${esc(v.name)}</div></div>
            <button class="btn-danger" onclick="window.deleteVisit('${v.id}')">Delete</button>
          </div>
          <div class="visit-ordered"><strong>Ordered:</strong> ${esc(v.ordered)}</div>
          <div class="visit-scores">${chips}<div class="total-chip">Avg: ${v.avg}/10</div></div>
          ${v.notes ? `<div class="visit-notes">"${esc(v.notes)}"</div>` : ''}
        </div>`;
    }).join('');
  }

  /* ---- Picks pool ---- */
  function renderPicksPool() {
    const container = document.getElementById('picks-list');
    if (!allRecommendations.length) {
      container.innerHTML = `<div class="empty-state"><div class="emoji">📍</div><p>No recommendations yet — add one on the Home tab!</p></div>`;
      return;
    }
    const seed = getWeekSeed();
    const thisWeekIdx = seed % allRecommendations.length;
    container.innerHTML = allRecommendations.map((r, i) => `
      <div class="pick-pool-item">
        <div style="flex:1;min-width:0;">
          <div class="pick-pool-name">${esc(r.name)}</div>
          ${r.mapsUrl ? `<a href="${esc(r.mapsUrl)}" target="_blank" rel="noopener" class="pick-pool-link">📍 Maps link</a>` : ''}
        </div>
        ${i === thisWeekIdx ? `<span class="badge-thisweek">This week</span>` : ''}
        <button class="btn-danger" onclick="window.deleteRecommendation('${r.id}')">Delete</button>
      </div>`
    ).join('');
  }

  window.deleteVisit = async function(id) {
    if (!confirm('Delete this visit?')) return;
    await deleteDoc(doc(db, 'visits', id));
  };

  window.deleteRecommendation = async function(id) {
    if (!confirm('Remove this recommendation?')) return;
    await deleteDoc(doc(db, 'recommendations', id));
  };

  /* ---- Toast ---- */
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
  window.showToast = showToast;

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  buildRatings();
  setDefaults();
</script>
</body>
</html>
